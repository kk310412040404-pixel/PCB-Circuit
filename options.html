<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review & Tùy chọn</title>
    <link href="style.css" rel="stylesheet">
</head>
<body class="step2-layout"> 
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid"><span class="navbar-brand mb-0 h1">PCB Tool - Bước 2</span></div>
    </nav>
    <div class="container-fluid px-4">
        <div class="row">
            <div class="col-md-4 col-lg-3">
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-primary text-white">⚙️ Cấu hình cắt</div>
                    <div class="card-body">
                        <div class="alert alert-info py-2">
                            <h6 class="alert-heading fw-bold mb-1">Kích thước mạch:</h6>
                            <span>Rộng: <strong id="val_w">0</strong> mm</span><br>
                            <span>Cao: <strong id="val_h">0</strong> mm</span>
                        </div>
                        <form id="optionsForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Số lượng mạch muốn làm:</label>
                                <input type="number" id="quantity" class="form-control" value="1" min="1">
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-bold">TIẾP THEO &rarr;</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-8 col-lg-9">
                <div class="card shadow-sm">
                    <div class="card-body text-center bg-light">
                        <div class="tab-content w-100">
                            <div class="tab-pane fade show active" id="trace">
                                <img id="img_trace" class="preview-img shadow-sm" alt="Trace">
                            </div>
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const NGROK_URL = "https://modish-jay-unviolently.ngrok-free.dev";
        
        // Hiển thị kích thước
        document.getElementById('val_w').innerText = localStorage.getItem('pcb_w_mm') || 0;
        document.getElementById('val_h').innerText = localStorage.getItem('pcb_h_mm') || 0;
        
        // Tải ảnh từ Server máy tính
        document.getElementById('img_trace').src = `${NGROK_URL}/image/FINAL_trace.png`;
        // document.getElementById('img_drill').src = `${NGROK_URL}/image/FINAL_drill.png`;
        // document.getElementById('img_outline').src = `${NGROK_URL}/image/FINAL_outline.png`;

        // Xử lý nút Tiếp Theo
        document.getElementById('optionsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('pcb_qty', document.getElementById('quantity').value);
            window.location.href = "position.html";
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
